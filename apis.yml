  url: https://www.axonius.com/privacy-policy
- type: GettingStarted
  url: https://docs.axonius.com/docs/getting-started
- type: Features
  data:
  - name: Asset Discovery
    description: Automatically discover all devices, users, and cloud assets 
      across the environment.
  - name: SaaS Management
    description: Manage SaaS application access, licenses, and security posture 
      from a single platform.
  - name: Security Enforcement
    description: Enforce security policies across assets and trigger automated 
      remediation workflows.
  - name: Integration Hub
    description: Connect to 800+ security and IT tools for data aggregation and 
      correlation.
  - name: Vulnerability Management
    description: Correlate vulnerability scanner data with asset context for 
      prioritized remediation.
  - name: Compliance Reporting
    description: Generate compliance reports for CIS Benchmarks, NIST, PCI DSS, 
      and other frameworks.
  - name: Query Builder
    description: Build complex queries to find assets matching specific security
      criteria.
  - name: Lifecycle Management
    description: Track asset lifecycle from procurement to decommission with 
      full audit trail.
- type: UseCases
  data:
  - name: Asset Inventory
    description: Maintain a complete, always-accurate inventory of all IT and OT
      assets.
  - name: Shadow IT Discovery
    description: Identify unauthorized devices and SaaS applications in use 
      across the organization.
  - name: Zero Trust Security
    description: Enforce zero trust policies by continuously validating asset 
      compliance.
  - name: Incident Response
    description: Quickly identify affected assets during security incidents for 
      rapid containment.
  - name: Compliance Auditing
    description: Prove compliance with security frameworks using comprehensive 
      asset data.
- type: Integrations
  data:
  - name: CrowdStrike
    description: Pull endpoint data from CrowdStrike Falcon to enrich asset 
      inventory.
  - name: Microsoft Active Directory
    description: Sync user and device data from Active Directory and Azure AD.
  - name: ServiceNow
    description: Push asset data and incidents to ServiceNow CMDB and ITSM.
  - name: Qualys
    description: Correlate Qualys vulnerability scan data with asset context.
  - name: Okta
    description: Correlate SaaS user access data with identity from Okta.
